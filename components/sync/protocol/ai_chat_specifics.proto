// Sync protocol datatype extension for AI Chat conversations.

syntax = "proto2";

option java_multiple_files = true;
option java_package = "org.chromium.components.sync.protocol";

option optimize_for = LITE_RUNTIME;

package sync_pb;

// Represents a complete AI Chat conversation including all entries and events.
// Each sync entity corresponds to one conversation.
message AIChatConversationSpecifics {
  // Unique identifier for this conversation. Used as client tag and storage
  // key.
  optional string uuid = 1;
  optional string title = 2;
  optional string model_key = 3;
  optional uint64 total_tokens = 4;
  optional uint64 trimmed_tokens = 5;
  optional int64 created_time_unix_epoch_micros = 6;
  optional int64 last_modified_time_unix_epoch_micros = 7;

  repeated AIChatAssociatedContentProto associated_content = 10;
  repeated AIChatConversationEntryProto entries = 11;
}

// Metadata for content associated with a conversation (e.g. a web page).
// Full text content is not synced as it can be large and re-derivable.
message AIChatAssociatedContentProto {
  optional string uuid = 1;
  optional string title = 2;
  optional string url = 3;
  // mojom::ContentType (0=PageContent, 1=VideoTranscript)
  optional int32 content_type = 4;
  optional int32 content_used_percentage = 5;
  // The conversation entry this content is associated with.
  optional string conversation_entry_uuid = 6;
}

// A single turn in the conversation (human or assistant message).
message AIChatConversationEntryProto {
  optional string uuid = 1;
  optional int64 date_unix_epoch_micros = 2;
  optional string entry_text = 3;
  // Optional user-invisible override prompt sent to AI engine.
  optional string prompt = 4;
  // mojom::CharacterType (0=HUMAN, 1=ASSISTANT)
  optional int32 character_type = 5;
  // UUID of the parent entry being edited (for edit history tracking).
  optional string editing_entry_uuid = 6;
  // mojom::ActionType enum
  optional int32 action_type = 7;
  // Selected text from page context.
  optional string selected_text = 8;
  optional string model_key = 9;
  // Serialized skill data.
  optional bytes smart_mode_data = 10;
  // NEAR AI TEE attestation verification status.
  optional bool is_near_verified = 11;

  repeated AIChatEntryEventProto events = 20;
}

// An event within a conversation entry (completion text, search, tool use,
// etc.)
message AIChatEntryEventProto {
  optional int32 event_order = 1;
  oneof event {
    string completion_text = 2;
    // "|||"-delimited search query strings.
    string search_queries = 3;
    // Serialized WebSourcesEventProto.
    bytes web_sources_serialized = 4;
    // Serialized InlineSearchEventProto.
    bytes inline_search_serialized = 5;
    // Serialized ToolUseEventProto.
    bytes tool_use_serialized = 6;
  }
}
